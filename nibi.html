<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nibi — Coming Soon</title>
  <meta name="description" content="Nibi is Maple VC's accelerator program. Coming soon.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=Inter:wght@400;500;600;700;800&family=Nunito:wght@900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    body { background: var(--black); }
    .nav { position: fixed !important; top: 0; left: 0; right: 0; z-index: 999 !important; }

    /* CRT scanlines overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
    }

    .nibi-soon {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: var(--pad);
      position: relative; overflow: hidden;
    }

    /* Faint radial glow */
    .nibi-soon::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,209,0,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .nibi-soon-inner {
      position: relative; z-index: 1;
      text-align: center; max-width: 680px;
    }

    /* Nibi pixel grid mark */
    .nibi-soon-mark { margin-bottom: 48px; display: inline-block; }

    .nibi-soon-eyebrow {
      font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(255,209,0,0.45); font-weight: 700;
      margin-bottom: 40px; display: block;
      font-family: var(--font-body);
    }
    .nibi-soon-eyebrow::before,
    .nibi-soon-eyebrow::after {
      content: '—';
      margin: 0 12px;
      opacity: 0.3;
    }

    .nibi-soon h1 {
      font-family: var(--font-display);
      font-size: clamp(64px, 10vw, 140px);
      font-weight: 400; line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--cream);
      margin-bottom: 0;
    }
    .nibi-soon h1 em {
      color: var(--yellow); font-style: italic;
      text-shadow: 0 0 60px rgba(255,209,0,0.25), 0 0 120px rgba(255,209,0,0.08);
      display: block;
    }

    /* Braun measurement rule */
    .nibi-rule {
      display: flex; align-items: flex-end; gap: 0;
      margin: 52px auto 52px;
      width: 100%; max-width: 360px; height: 20px;
    }
    .nibi-seg { flex: 1; height: 1px; background: rgba(255,249,237,0.08); align-self: center; }
    .nibi-tick { width: 1px; flex-shrink: 0; background: rgba(255,249,237,0.18); }
    .nibi-tick-s { height: 7px; align-self: flex-end; }
    .nibi-tick-l { height: 16px; align-self: flex-end; }

    .nibi-soon-sub {
      font-size: clamp(14px, 1.5vw, 17px);
      color: rgba(255,249,237,0.32);
      line-height: 1.8; margin-bottom: 56px;
      font-family: var(--font-body);
    }

    /* Data strip */
    .nibi-soon-data {
      display: inline-flex; gap: 0;
      border: 1px solid rgba(255,249,237,0.08);
      margin-bottom: 56px;
    }
    .nibi-soon-data-item {
      padding: 10px 22px;
      border-right: 1px solid rgba(255,249,237,0.08);
      display: flex; flex-direction: column; gap: 4px;
    }
    .nibi-soon-data-item:last-child { border-right: none; }
    .nibi-soon-data-key {
      font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase;
      font-weight: 700; color: rgba(255,249,237,0.2);
    }
    .nibi-soon-data-val {
      font-size: 12px; font-weight: 600; color: rgba(255,249,237,0.55);
      letter-spacing: 0.02em;
    }

    .nibi-soon-link {
      display: inline-block;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      font-weight: 700; color: var(--yellow);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,209,0,0.25);
      padding-bottom: 3px;
      transition: border-color 0.2s;
    }
    .nibi-soon-link:hover { border-color: var(--yellow); }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-logo"><img src="images/logo.jpg" alt="Maple" style="height:32px;width:auto;max-width:none;"></a>
  <ul class="nav-links">

    <li><a href="/contact.html">Contact</a></li>

  </ul>

<!-- COMING SOON -->
<section class="nibi-soon">
  <div class="nibi-soon-inner">


    <h1>
      Coming
      <em>soon.</em>
    </h1>

    <div class="nibi-rule" aria-hidden="true">
      <span class="nibi-tick nibi-tick-l"></span>
      <span class="nibi-seg"></span>
      <span class="nibi-tick nibi-tick-s"></span>
      <span class="nibi-seg"></span>
      <span class="nibi-tick nibi-tick-s"></span>
      <span class="nibi-seg"></span>
      <span class="nibi-tick nibi-tick-l"></span>
      <span class="nibi-seg"></span>
      <span class="nibi-tick nibi-tick-s"></span>
      <span class="nibi-seg"></span>
      <span class="nibi-tick nibi-tick-s"></span>
      <span class="nibi-seg"></span>
      <span class="nibi-tick nibi-tick-l"></span>
    </div>

    <div class="nibi-soon-data">
      <div class="nibi-soon-data-item">
        <span class="nibi-soon-data-key">Cohort</span>
        <span class="nibi-soon-data-val">2026</span>
      </div>
      <div class="nibi-soon-data-item">
        <span class="nibi-soon-data-key">Stage</span>
        <span class="nibi-soon-data-val">Pre-seed</span>
      </div>
      <div class="nibi-soon-data-item">
        <span class="nibi-soon-data-key">Location</span>
        <span class="nibi-soon-data-val">Montreal, Canada</span>
      </div>
      <div class="nibi-soon-data-item">
        <span class="nibi-soon-data-key">Status</span>
        <span class="nibi-soon-data-val">Coming soon</span>
      </div>
    </div>

    <p class="nibi-soon-sub">
      Nibi is Maple's accelerator for founders at the earliest stages, globally.<br>$250k checks, 3 month accelerator, based in Montreal, Canada.
    </p>

    <a href="https://x.com/Nibi_VC" target="_blank" rel="noopener" class="nibi-soon-link">Keep up here →</a>

  </div>
</section>

<script src="main.js"></script>
</body>
</html>
